<!DOCTYPE html>
<html>
<head>
    <title>Z-Survival: Industrial Overlord</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; filter: contrast(1.2) brightness(0.9); }
        
        /* UI Design */
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border: 2px solid #0f0; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .res-row { display: flex; gap: 15px; margin-top: 10px; font-size: 14px; }
        
        /* Hotbar */
        #hotbar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 15px; border: 2px solid #444; }
        .slot { width: 60px; height: 60px; border: 2px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; transition: 0.2s; background: #111; }
        .slot.active { border-color: #0f0; background: #030; box-shadow: 0 0 15px #0f0; transform: scale(1.1); }
        .slot::after { content: attr(data-key); position: absolute; top: 2px; left: 5px; font-size: 10px; color: #888; }

        /* Crafting Menu */
        #crafting { position: absolute; right: 20px; top: 20px; background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #0f0; border-radius: 10px; width: 240px; }
        .item-btn { width: 100%; padding: 10px; margin: 5px 0; background: #020; border: 1px solid #0f0; color: #0f0; cursor: pointer; text-align: left; border-radius: 5px; }
        .item-btn:hover { background: #0f0; color: #000; }
        .item-btn:disabled { opacity: 0.2; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 20px; font-weight: bold; color: #f00;">HP: <span id="hp">100</span> | FOOD: <span id="food">100</span></div>
    <div class="res-row">
        <span>🪵 <span id="r-wood">0</span></span>
        <span>🪨 <span id="r-stone">0</span></span>
        <span>⛓️ <span id="r-iron">0</span></span>
    </div>
    <div class="res-row">
        <span>⚙️ <span id="r-screw">0</span></span>
        <span>🔋 <span id="r-batt">0</span></span>
        <span>🔫 <span id="r-ammo">10</span></span>
    </div>
</div>

<div id="crafting">
    <b style="color:yellow">FACTORY & SMITHING</b>
    <button class="item-btn" id="c-pick" onclick="craft('pickaxe')">1. Craft Trä-Pickaxe (10 Trä)</button>
    <button class="item-btn" onclick="craft('drill')">2. Bygg Borr (20 Sten, 5 Skruv)</button>
    <button class="item-btn" onclick="craft('farm')">3. Starta Farm (10 Trä)</button>
    <hr>
    <button class="item-btn" onclick="craft('barrel')">4. Smid Pipa (20 Järn)</button>
    <button class="item-btn" onclick="craft('mag')">5. Smid Magasin (10 Järn)</button>
    <button class="item-btn" onclick="craft('ak47')">6. ASSEMBLE AK-47</button>
</div>

<div id="hotbar">
    <div class="slot active" id="slot1" data-key="1">✋</div>
    <div class="slot" id="slot2" data-key="2">⛏️</div>
    <div class="slot" id="slot3" data-key="3">🔫</div>
    <div class="slot" id="slot4" data-key="4">💥</div>
    <div class="slot" id="slot5" data-key="5">🏗️</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- SPEL-DATA ---
let p = { x: 2000, y: 2000, hp: 100, food: 100, wood: 0, stone: 0, iron: 0, screw: 0, batt: 0, ammo: 10, barrel:0, mag:0 };
let inv = { hasPick: false, hasAK: false, currentSlot: 1 };
let objects = [], bullets = [], particles = [];
let keys = {};
let mouseX = 0, mouseY = 0;

// --- INITIALIZE WORLD ---
function init() {
    for(let i=0; i<150; i++) spawn('tree', Math.random()*4000, Math.random()*4000);
    for(let i=0; i<100; i++) spawn('stone', Math.random()*4000, Math.random()*4000);
    for(let i=0; i<50; i++) spawn('scrap', Math.random()*4000, Math.random()*4000);
}

function spawn(type, x, y) {
    objects.push({ type, x, y, hp: 5, id: Math.random(), timer: 0, shake: 0 });
}

// --- CRAFTING ---
function craft(item) {
    if(item === 'pickaxe' && p.wood >= 10) { p.wood -= 10; inv.hasPick = true; document.getElementById('c-pick').innerText = "Pickaxe ✅"; }
    if(item === 'drill' && p.stone >= 20 && p.screw >= 5) { p.stone -= 20; p.screw -= 5; spawn('drill', p.x, p.y); }
    if(item === 'farm' && p.wood >= 10) { p.wood -= 10; spawn('farm', p.x, p.y); }
    if(item === 'barrel' && p.iron >= 20) { p.iron -= 20; p.barrel++; }
    if(item === 'mag' && p.iron >= 10) { p.iron -= 10; p.mag++; }
    if(item === 'ak47' && p.barrel >= 1 && p.mag >= 1) { p.barrel--; p.mag--; inv.hasAK = true; p.ammo += 100; }
    updateUI();
}

// --- INPUTS ---
window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    if(['1','2','3','4','5'].includes(e.key)) {
        inv.currentSlot = parseInt(e.key);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('slot' + e.key).classList.add('active');
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouseX = e.clientX; mouseY = e.clientY; };

window.onmousedown = () => {
    // Skjut logik (Endast slot 3 och 4)
    if((inv.currentSlot === 3 || (inv.currentSlot === 4 && inv.hasAK)) && p.ammo > 0) {
        p.ammo--;
        let angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
        bullets.push({ x: p.x, y: p.y, a: angle, s: 20, l: 40 });
        updateUI();
    }
};

// --- CORE ENGINE ---
function update() {
    // Movement
    let speed = 5;
    if(keys.w) p.y -= speed; if(keys.s) p.y += speed;
    if(keys.a) p.x -= speed; if(keys.d) p.x += speed;

    p.food -= 0.002;
    if(p.food <= 0) { p.food = 0; p.hp -= 0.05; }

    objects.forEach((obj, i) => {
        let d = Math.hypot(p.x - obj.x, p.y - obj.y);
        
        // INTERAKTION
        if(d < 60 && keys[' ']) {
            obj.shake = 10;
            if(obj.type === 'tree' && inv.currentSlot === 1) { 
                obj.hp -= 0.1; 
                if(obj.hp <= 0) { p.wood += 5; objects.splice(i, 1); }
            }
            if(obj.type === 'stone' && inv.currentSlot === 2 && inv.hasPick) { 
                obj.hp -= 0.1; 
                if(obj.hp <= 0) { p.stone += 5; objects.splice(i, 1); }
            }
            if(obj.type === 'scrap') { p.screw += 2; p.batt += 1; objects.splice(i, 1); }
            if(obj.type === 'farm' && obj.timer > 500) { p.food = 100; objects.splice(i, 1); }
            updateUI();
        }

        // AUTO MACHINES
        if(obj.type === 'drill') {
            obj.timer++;
            if(obj.timer % 120 === 0) { p.iron += 1; updateUI(); }
        }
        if(obj.type === 'farm') obj.timer++;
        
        if(obj.shake > 0) obj.shake *= 0.8;
    });

    bullets.forEach((b, i) => {
        b.x += Math.cos(b.a)*b.s; b.y += Math.sin(b.a)*b.s; b.l--;
        if(b.l <= 0) bullets.splice(i, 1);
    });
}

function draw() {
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width/2 - p.x, canvas.height/2 - p.y);

    // Rita Värld
    objects.forEach(obj => {
        ctx.save();
        ctx.translate(obj.x + Math.random()*obj.shake, obj.y + Math.random()*obj.shake);
        
        if(obj.type === 'tree') {
            ctx.fillStyle = '#1a3c1a'; ctx.fillRect(-20, -20, 40, 40);
            ctx.fillStyle = '#2d5a27'; ctx.fillRect(-15, -45, 30, 30);
        } else if(obj.type === 'stone') {
            ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(0,0,20,0,7); ctx.fill();
        } else if(obj.type === 'drill') {
            ctx.fillStyle = '#ff0'; ctx.fillRect(-25,-25,50,50);
            ctx.strokeStyle = '#fff'; ctx.strokeRect(-30,-30,60,60);
        } else if(obj.type === 'farm') {
            ctx.fillStyle = obj.timer > 500 ? '#f1c40f' : '#3e2723';
            ctx.fillRect(-30, -30, 60, 60);
        } else if(obj.type === 'scrap') {
            ctx.fillStyle = '#e67e22'; ctx.fillRect(-10, -10, 20, 20);
        }
        ctx.restore();
    });

    // Bullets
    ctx.fillStyle = 'yellow';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 6, 2));

    // Spelare
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
    // Spelare sikte (Handen/Vapnet)
    let ang = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + Math.cos(ang)*35, p.y + Math.sin(ang)*35); ctx.stroke();

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

function updateUI() {
    document.getElementById('hp').innerText = Math.floor(p.hp);
    document.getElementById('food').innerText = Math.floor(p.food);
    document.getElementById('r-wood').innerText = p.wood;
    document.getElementById('r-stone').innerText = p.stone;
    document.getElementById('r-iron').innerText = p.iron;
    document.getElementById('r-screw').innerText = p.screw;
    document.getElementById('r-batt').innerText = p.batt;
    document.getElementById('r-ammo').innerText = p.ammo;
}

init();
draw();
</script>
</body>
</html>
