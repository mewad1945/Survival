<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Z-Survival: Military & Industry</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        
        /* UI Paneler */
        .panel { position: absolute; background: rgba(0,20,0,0.9); border: 1px solid #0f0; padding: 10px; border-radius: 5px; }
        #stats { top: 10px; left: 10px; width: 200px; }
        #inventory { top: 10px; right: 10px; width: 220px; font-size: 12px; }
        #craft-menu { bottom: 80px; left: 50%; transform: translateX(-50%); width: 600px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        button { background: #030; color: #0f0; border: 1px solid #0f0; cursor: pointer; padding: 5px; font-size: 11px; }
        button:hover { background: #0f0; color: #000; }
        button:disabled { color: #222; border-color: #222; }

        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .slot { width: 45px; height: 45px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; background: #111; }
        .slot.active { border-color: #0f0; box-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>

<div id="stats" class="panel">
    <div style="color:red">❤️ HP: <span id="hp">100</span></div>
    <div style="color:orange">🍗 MAT: <span id="food">100</span></div>
    <hr>
    <div>🛠️ MODE: <span id="mode-text">HAND</span></div>
</div>

<div id="inventory" class="panel">
    <b>RESERVOAR</b><br>
    🪵 Wood: <span id="v-wood">0</span> | 🪨 Stone: <span id="v-stone">0</span><br>
    ⛓️ Iron: <span id="v-iron">0</span> | ⚙️ Parts: <span id="v-parts">0</span><br>
    🌱 Seeds: <span id="v-seeds">0</span> | 🔫 Ammo: <span id="v-ammo">10</span>
    <hr>
    <b>DELAR</b><br>
    Pipa: <span id="v-barrel">0</span> | Mag: <span id="v-mag">0</span> | Muzzle: <span id="v-muzzle">0</span>
</div>

<div id="craft-menu" class="panel">
    <div>
        <b>BAS-VERKTYG</b>
        <button onclick="craft('shovel')">Spade (5 Wood)</button>
        <button onclick="craft('pickaxe')">Pickaxe (10 Wood)</button>
    </div>
    <div>
        <b>VAPEN-DELAR (Smed)</b>
        <button onclick="craft('barrel')">Smid Pipa (10 Iron)</button>
        <button onclick="craft('mag')">Smid Magasin (5 Iron)</button>
        <button onclick="craft('muzzle')">Smid Muzzle (5 Iron)</button>
        <button onclick="craft('machinegun')">MONTERA KULSPRUTA</button>
    </div>
    <div>
        <b>FORDON & TEKNIK</b>
        <button onclick="craft('car')">Bygg Bil (50 Iron, 10 Parts)</button>
        <button onclick="craft('plane')">Flygplan (100 Iron, 20 Parts)</button>
        <button onclick="craft('radar')">Radar (20 Iron, 5 Parts)</button>
    </div>
</div>

<div id="hotbar">
    <div class="slot active" id="s1">1✋</div>
    <div class="slot" id="s2">2⛏️</div>
    <div class="slot" id="s3">3🥄</div>
    <div class="slot" id="s4">4🔫</div>
    <div class="slot" id="s5">5🏎️</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

// --- SPEL-DATA ---
let p = { x: 0, y: 0, hp: 100, food: 100, wood: 0, stone: 0, iron: 0, parts: 0, seeds: 5, ammo: 10, slot: 1 };
let inv = { shovel: false, pickaxe: false, barrel: 0, mag: 0, muzzle: 0, car: false, plane: false, mg: false };
let world = [];
let bullets = [];
let keys = {};

function init() {
    for(let i=0; i<50; i++) spawn('tree', (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
    for(let i=0; i<40; i++) spawn('stone', (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
    for(let i=0; i<30; i++) spawn('scrap', (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
}

function spawn(type, x, y) {
    world.push({ type, x, y, hp: 10, timer: 0, ready: false });
}

// --- CRAFTING SYSTEM ---
function craft(item) {
    if(item === 'shovel' && p.wood >= 5) { p.wood -= 5; inv.shovel = true; }
    if(item === 'pickaxe' && p.wood >= 10) { p.wood -= 10; inv.pickaxe = true; }
    if(item === 'barrel' && p.iron >= 10) { p.iron -= 10; inv.barrel++; }
    if(item === 'mag' && p.iron >= 5) { p.iron -= 5; inv.mag++; }
    if(item === 'muzzle' && p.iron >= 5) { p.iron -= 5; inv.muzzle++; }
    
    if(item === 'machinegun' && inv.barrel >= 1 && inv.mag >= 1 && inv.muzzle >= 1) {
        inv.barrel--; inv.mag--; inv.muzzle--; inv.mg = true; p.ammo += 50;
    }

    if(item === 'car' && p.iron >= 50 && p.parts >= 10) { p.iron -= 50; p.parts -= 10; inv.car = true; }
    
    updateUI();
}

// --- KONTROLLER ---
window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    if(['1','2','3','4','5'].includes(e.key)) {
        p.slot = parseInt(e.key);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + e.key).classList.add('active');
        const modes = ["HAND", "PICKAXE", "SHOVEL", "WEAPON", "VEHICLE"];
        document.getElementById('mode-text').innerText = modes[p.slot-1];
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

window.onmousedown = () => {
    // Skjut (Slot 4)
    if(p.slot === 4 && p.ammo > 0) {
        p.ammo--;
        let a = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
        bullets.push({ x: p.x, y: p.y, a });
    }
    // Plantera (Slot 3 - Spade)
    if(p.slot === 3 && inv.shovel && p.seeds > 0) {
        p.seeds--;
        spawn('farm', p.x, p.y);
    }
};

let mouseX = 0, mouseY = 0;
window.onmousemove = e => { mouseX = e.clientX; mouseY = e.clientY; };

// --- LOOP ---
function update() {
    let speed = inv.car && p.slot === 5 ? 12 : 5; // Bilen går snabbare!
    if(keys.w) p.y -= speed; if(keys.s) p.y += speed;
    if(keys.a) p.x -= speed; if(keys.d) p.x += speed;

    p.food -= 0.005;

    world.forEach((obj, i) => {
        let d = Math.hypot(p.x - obj.x, p.y - obj.y);
        if(d < 60 && keys[' ']) {
            if(obj.type === 'tree' && p.slot === 1) { obj.hp -= 0.2; if(obj.hp<=0){p.wood+=5; world.splice(i,1);} }
            if(obj.type === 'stone' && p.slot === 2 && inv.pickaxe) { obj.hp -= 0.2; if(obj.hp<=0){p.stone+=5; world.splice(i,1);} }
            if(obj.type === 'scrap') { p.parts += 2; p.iron += 5; world.splice(i,1); }
            if(obj.type === 'farm' && obj.ready) { p.food = 100; p.seeds += 2; world.splice(i,1); }
        }
        if(obj.type === 'farm') {
            obj.timer++; if(obj.timer > 500) obj.ready = true;
        }
    });

    bullets.forEach((b, i) => { b.x += Math.cos(b.a)*20; b.y += Math.sin(b.a)*20; });
    updateUI();
}

function updateUI() {
    document.getElementById('hp').innerText = Math.floor(p.hp);
    document.getElementById('food').innerText = Math.floor(p.food);
    document.getElementById('v-wood').innerText = p.wood;
    document.getElementById('v-stone').innerText = p.stone;
    document.getElementById('v-iron').innerText = p.iron;
    document.getElementById('v-parts').innerText = p.parts;
    document.getElementById('v-seeds').innerText = p.seeds;
    document.getElementById('v-ammo').innerText = p.ammo;
    document.getElementById('v-barrel').innerText = inv.barrel;
    document.getElementById('v-mag').innerText = inv.mag;
    document.getElementById('v-muzzle').innerText = inv.muzzle;
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - p.x, canvas.height/2 - p.y);

    world.forEach(obj => {
        if(obj.type === 'tree') ctx.fillStyle = 'green';
        else if(obj.type === 'stone') ctx.fillStyle = '#555';
        else if(obj.type === 'scrap') ctx.fillStyle = 'blue';
        else if(obj.type === 'farm') ctx.fillStyle = obj.ready ? 'yellow' : 'brown';
        ctx.fillRect(obj.x-15, obj.y-15, 30, 30);
    });

    // Rita Spelare / Bil
    ctx.fillStyle = (inv.car && p.slot === 5) ? 'red' : '#0f0';
    if(inv.car && p.slot === 5) ctx.fillRect(p.x-25, p.y-15, 50, 30);
    else { ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill(); }

    ctx.fillStyle = 'white'; bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

init(); draw();
</script>
</body>
</html>
